<script type="module">

 import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

} from "https://www.gstatic.com/firebasejs/12.11.0/firebase-auth.js";

const firebaseConfig = {

};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let carrinho = [];
let produtos = [];
let categoriaFiltroCliente = "todos";
let unsubscribePedidosAdmin = null;
let statusFiltroPedidosAtual = "todos";

let configLoja = {
  descontoPix: 5,
  minimoPix: 50
};

// 🔐 login admin
let adminLogado = false;
let adminEmail = "";

onAuthStateChanged(auth, (user) => {
  if (user) {
    adminLogado = true;
    adminEmail = user.email || "";

  } else {
    adminLogado = false;

    console.log("Nenhum admin logado");

// 🔥 CARREGAR PRODUTOS DO FIREBASE
function carregarProdutosFirebase() {
  onSnapshot(collection(db, "Produtos"), (snapshot) => {
    produtos = snapshot.docs.map(docSnap => ({
      id: docSnap.id,
      ...docSnap.data()
    }));

    produtos.sort((a, b) => {
  let ordemA = a.ordem ?? 999;
  let ordemB = b.ordem ?? 999;

  if (ordemA !== ordemB) return ordemA - ordemB;

  return (a.nome || "").localeCompare(b.nome || "", "pt-BR");
});

    gerarProdutos();
    renderFiltrosCategoriaCliente();
    filtrarProdutosCliente();

    produtos.forEach((p, index) => {
      let id = index + 1;
      mostrarEstoque("stock" + id);
      atualizarSelect("op" + id, "stock" + id);
    });
  }, (erro) => {
    console.error("Erro ao ouvir produtos do Firebase:", erro);
    alert("Erro ao carregar produtos.");
  });
}

function gerarProdutos() {
  let container = document.getElementById("produtosContainer");
  container.innerHTML = "";

  produtos.forEach((p, index) => {
    let idTela = index + 1;
    let temOpcoes = Array.isArray(p.opcoes) && p.opcoes.length > 0;

    let opcoesHTML = "";
    if (temOpcoes) {
      opcoesHTML = `<option value="">Opções</option>`;
      p.opcoes.forEach(op => {
        opcoesHTML += `<option value="${op}" data-img="${op}.jpg">${op}</option>`;
      });
    }

    container.innerHTML += `
  <div class="card" data-nome="${p.nome.toLowerCase()}" data-categoria="${(p.categoria || 'sem categoria').toLowerCase()}" style="position:relative;">
    ${p.promocao ? `
      <div style="
        position:absolute;
        top:10px;
        left:10px;
        background:#8b0000;
        color:#fff;
        padding:6px 10px;
        border-radius:999px;
        font-size:12px;
        font-weight:bold;
        z-index:2;
      ">
        🔥 Promoção
      </div>
    ` : ""}

    <img id="img${idTela}" 
      src="imagens/${p.pasta}/${p.imagem}"
          onerror="this.onerror=null; this.src='imagens/sem-imagem.jpg'">

        <h3>${p.nome} - ${p.marca}</h3>

        <div class="price">R$ ${Number(p.preco).toFixed(2)}</div>

        <div class="stock" id="stock${idTela}">
          <b>${temOpcoes ? "Selecione uma opção" : ""}</b>
        </div>

        ${
          temOpcoes
            ? `<select id="op${idTela}" onchange="trocarImagem('op${idTela}','img${idTela}','${p.pasta}')">
                ${opcoesHTML}
              </select>`
            : ``
        }

        <button class="btn" onclick="addProduto('${p.id}', ${temOpcoes ? `'op${idTela}'` : 'null'})">
          Adicionar
        </button>
      </div>
    `;
  });
}

window.trocarImagem = function (selectId, imgId, pasta) {
  let select = document.getElementById(selectId);
  let img = document.getElementById(imgId);

  if (!select) return;

  let optionSelecionada = select.options[select.selectedIndex];
  if (!optionSelecionada || !optionSelecionada.value) {
    return;
  }

  let nomeImagem = optionSelecionada.getAttribute("data-img");

  if (nomeImagem) {
    img.src = "imagens/" + pasta + "/" + nomeImagem;
    img.onerror = function () {
      this.onerror = null;
      this.src = "imagens/sem-imagem.jpg";
    };
  }

  let id = selectId.replace("op", "");
  mostrarEstoque("stock" + id);
};


function mostrarEstoque(stockId) {
  let id = stockId.replace("stock", "");
  let select = document.getElementById("op" + id);
  let div = document.getElementById(stockId);

  let produto = produtos[id - 1];
  if (!produto) return;

  let estoque = produto.estoque || {};
  let temOpcoes = Array.isArray(produto.opcoes) && produto.opcoes.length > 0;

  if (temOpcoes) {
    if (select && select.value) {
      let opcao = select.value;
      let qtd = Number(estoque[opcao] || 0);

      div.innerHTML = qtd <= 0
        ? `🔴 ${opcao}: Esgotado`
        : `🟢 ${opcao}: Disponível`;
      return;
    }

    div.innerHTML = `<b>Selecione uma opção</b>`;
    return;
  }

  let qtdUnico = Number(estoque.unico || 0);
  div.innerHTML = qtdUnico <= 0
    ? `🔴 Esgotado`
    : `🟢 Disponível`;
}


async function devolverEstoqueProduto(produtoId, opcao, quantidade = 1) {
  const ref = doc(db, "Produtos", produtoId);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);

    if (!snap.exists()) {
      throw new Error("Produto não encontrado");
    }

    const produto = snap.data();
    let estoque = produto.estoque || {};

    let chaveEstoque = opcao || "unico";
    let atual = Number(estoque[chaveEstoque] || 0);

    estoque[chaveEstoque] = atual + quantidade;

    transaction.update(ref, {
      estoque
    });
  });
}


let tempoReserva = 5 * 60 * 1000 // 5 minutos

function salvarCarrinhoLocal() {
  localStorage.setItem("carrinho", JSON.stringify(carrinho));
}

async function carregarCarrinhoLocal() {
  let dados = localStorage.getItem("carrinho");
  if (!dados) return;

  carrinho = JSON.parse(dados);

  let agora = Date.now();

  for (let i = carrinho.length - 1; i >= 0; i--) {
    let item = carrinho[i];

    if (agora - item.tempo > tempoReserva) {
      await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);
      carrinho.splice(i, 1);
    }
  }

  salvarCarrinhoLocal();
  atualizarCarrinho();
}

window.toggleCarrinho = function () {
  let c = document.getElementById("cartPanel");
  if (!c) return;

  c.style.display = c.style.display === "block" ? "none" : "block";
  atualizarCarrinho();
};

async function baixarEstoqueProduto(produtoId, opcao, quantidade = 1) {
  const ref = doc(db, "Produtos", produtoId);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(ref);

    if (!snap.exists()) {
      throw new Error("Produto não encontrado");
    }

    const produto = snap.data();
    let estoque = produto.estoque || {};

    let chaveEstoque = opcao || "unico";
    let atual = Number(estoque[chaveEstoque] || 0);

    if (atual < quantidade) {
      throw new Error("Sem estoque");
    }

    estoque[chaveEstoque] = atual - quantidade;

    transaction.update(ref, {
      estoque
    });
  });
}

function atualizarCarrinho() {
  let lista = document.getElementById("lista");
  let pagamentoSelect = document.getElementById("pagamento");
  let entregaSelect = document.getElementById("entrega");
  let totalEl = document.getElementById("total");
  let badgeEl = document.getElementById("cartBadge");

  if (!lista || !pagamentoSelect || !entregaSelect || !totalEl || !badgeEl) return;

  lista.innerHTML = "";

  let subtotal = 0;
  let subtotalElegivelPix = 0;
  let qtd = 0;

  carrinho.forEach((item, index) => {
    let sub = Number(item.preco || 0) * Number(item.qtd || 0);

    subtotal += sub;
    qtd += Number(item.qtd || 0);

    if (!item.promocao) {
      subtotalElegivelPix += sub;
    }

    lista.innerHTML += `
      <div class="cartItem">
        <div>
          ${item.nome}<br>
          R$ ${Number(item.preco).toFixed(2)}
        </div>

        <div class="qtyControls">
          <button class="qtyBtn" onclick="diminuir(${index})">-</button>
          <b>${item.qtd}</b>
          <button class="qtyBtn" onclick="aumentar(${index})">+</button>
          <button class="removeBtn" onclick="remover(${index})">X</button>
        </div>
      </div>
    `;
  });

  let taxa = parseFloat(entregaSelect.value || 0);
let pagamento = String(pagamentoSelect.value || "").trim();

let desconto = 0;
let minimoPix = Number(configLoja.minimoPix || 0);
let descontoPix = Number(configLoja.descontoPix || 0);

if (pagamento === "PIX" && subtotalElegivelPix >= minimoPix) {
  desconto = subtotalElegivelPix * (descontoPix / 100);
}

  let total = subtotal + taxa - desconto;

  lista.innerHTML += `
    <div style="margin-top:12px; border-top:1px solid #ddd; padding-top:10px;">
      <div>Subtotal: R$ ${subtotal.toFixed(2)}</div>
      <div>Entrega: R$ ${taxa.toFixed(2)}</div>

      ${
        pagamento === "PIX" && subtotalElegivelPix < minimoPix
          ? `<div style="color:#8b0000;">
              Desconto no PIX acima de R$ ${minimoPix.toFixed(2)} Exceto promoções
            </div>`
          : ""
      }

      ${
        desconto > 0
          ? `<div style="color:green; font-weight:bold;">
              Desconto PIX (${descontoPix}%): - R$ ${desconto.toFixed(2)}
            </div>`
          : ""
      }
    </div>
  `;

  totalEl.innerText = total.toFixed(2);
  badgeEl.innerText = qtd;
}

function configurarEventosCarrinho() {
  let pagamentoSelect = document.getElementById("pagamento");
  let entregaSelect = document.getElementById("entrega");

  if (pagamentoSelect) {
    pagamentoSelect.addEventListener("change", atualizarCarrinho);
    pagamentoSelect.addEventListener("input", atualizarCarrinho);
  }

  if (entregaSelect) {
    entregaSelect.addEventListener("change", atualizarCarrinho);
    entregaSelect.addEventListener("input", atualizarCarrinho);
  }
}

window.addProduto = async function(produtoId, selectId) {
  let produto = produtos.find(p => p.id === produtoId);
  if (!produto) return;

  let temOpcoes = Array.isArray(produto.opcoes) && produto.opcoes.length > 0;
  let opcaoTexto = "unico";

  if (temOpcoes) {
    let select = document.getElementById(selectId);
    if (!select || !select.value) {
      alert("Selecione uma opção");
      return;
    }

    opcaoTexto = select.value;
  }

  try {
    await baixarEstoqueProduto(produtoId, opcaoTexto, 1);

    let nomeFinal = temOpcoes
      ? `${produto.nome} – ${opcaoTexto}`
      : produto.nome;

    let item = carrinho.find(i => i.nome === nomeFinal);

    if (item) {
      item.qtd++;
      item.tempo = Date.now();
    } else {
      carrinho.push({
       produtoId: produto.id,
       nome: nomeFinal,         
       preco: Number(produto.preco),
       qtd: 1,
       opcao: opcaoTexto,
       promocao: produto.promocao || false,
       tempo: Date.now()
      });
    }

    atualizarCarrinho();
    salvarCarrinhoLocal();
  } catch (erro) {
    console.error("Erro ao adicionar produto:", erro);
    alert("Produto sem estoque disponível.");
  }
};

window.aumentar = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await baixarEstoqueProduto(item.produtoId, item.opcao, 1);

    item.qtd++;
    item.tempo = Date.now();

    atualizarCarrinho();
    salvarCarrinhoLocal();
  } catch (erro) {
    console.error("Erro ao aumentar item:", erro);
    alert("Produto sem estoque disponível.");
  }
};

window.diminuir = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await devolverEstoqueProduto(item.produtoId, item.opcao, 1);

    item.qtd--;

    if (item.qtd <= 0) {
      carrinho.splice(index, 1);
    }

    atualizarCarrinho();
    salvarCarrinhoLocal();
  } catch (erro) {
    console.error("Erro ao diminuir item:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.remover = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);

    carrinho.splice(index, 1);
    atualizarCarrinho();
    salvarCarrinhoLocal();
  } catch (erro) {
    console.error("Erro ao remover item:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.limparCarrinho = async function() {
  try {
    for (let item of carrinho) {
      await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);
    }

    carrinho = [];

    let pagamentoSelect = document.getElementById("pagamento");
    let entregaSelect = document.getElementById("entrega");
    let pedidoEl = document.getElementById("pedido");

    if (pagamentoSelect) pagamentoSelect.selectedIndex = 0;
    if (entregaSelect) entregaSelect.selectedIndex = 0;
    if (pedidoEl) pedidoEl.value = "";

    atualizarCarrinho();
    salvarCarrinhoLocal();
  } catch (erro) {
    console.error("Erro ao limpar carrinho:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.gerarPedido = async function () {
  if (carrinho.length === 0) {
    alert("Carrinho vazio");
    return;
  }

  let pagamento = document.getElementById("pagamento").value;
  let entregaSelect = document.getElementById("entrega");
  let entregaTexto = entregaSelect.options[entregaSelect.selectedIndex].text;
  let taxa = parseFloat(entregaSelect.value || 0);

  if (!pagamento) {
    alert("Selecione a forma de pagamento.");
    return;
  }

  if (!entregaTexto || entregaTexto === "Opções de entrega") {
    alert("Selecione a opção de entrega.");
    return;
  }

  let texto = "Pedido\n\n";
  let subtotal = 0;
  let subtotalElegivelPix = 0;

  carrinho.forEach(i => {
    let sub = i.preco * i.qtd;
    subtotal += sub;

    if (!i.promocao) {
      subtotalElegivelPix += sub;
    }

    texto += `${i.nome}\n${i.qtd}Un R$ ${i.preco.toFixed(2)}\n\n`;
  });

  let desconto = 0;
  let minimoPix = Number(configLoja.minimoPix || 0);
  let descontoPix = Number(configLoja.descontoPix || 0);

  if (
    pagamento.toLowerCase() === "pix" &&
    subtotalElegivelPix >= minimoPix
  ) {
    desconto = subtotalElegivelPix * (descontoPix / 100);
  }

  let total = subtotal + taxa - desconto;

  texto += `Subtotal: R$ ${subtotal.toFixed(2)}\n`;
  texto += `Entrega: ${entregaTexto}\n`;
  texto += `Taxa: R$ ${taxa.toFixed(2)}\n`;

  if (desconto > 0) {
    texto += `Desconto PIX (${descontoPix}%): - R$ ${desconto.toFixed(2)}\n`;
  } else if (pagamento.toLowerCase() === "pix" && subtotalElegivelPix < minimoPix) {
    texto += `Sem desconto PIX (mínimo de R$ ${minimoPix.toFixed(2)} em produtos elegíveis)\n`;
  }

  texto += `Pagamento: ${pagamento}\n`;
  texto += `Total: R$ ${total.toFixed(2)}`;

  try {
    await salvarPedidoFirebaseComDesconto(
      subtotal,
      subtotalElegivelPix,
      taxa,
      desconto,
      total,
      pagamento,
      entregaTexto
    );

    document.getElementById("pedido").value = texto;
    await navigator.clipboard.writeText(texto);

    alert("Pedido salvo no Firebase e copiado!");

    carrinho = [];
    salvarCarrinhoLocal();

    // limpa os campos para não “grudar” a compra anterior
    let pagamentoSelect = document.getElementById("pagamento");
    let entregaSelect = document.getElementById("entrega");
    let pedidoEl = document.getElementById("pedido");

    if (pagamentoSelect) pagamentoSelect.selectedIndex = 0;
    if (entregaSelect) entregaSelect.selectedIndex = 0;
    if (pedidoEl) pedidoEl.value = "";

  atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao gerar pedido:", erro);
    alert("Erro ao salvar pedido.");

};

window.atualizarStatusPedido = async function (pedidoId, novoStatus) {
  try {
    const pedidoRef = doc(db, "Pedidos", pedidoId);

    await runTransaction(db, async (transaction) => {
      const pedidoSnap = await transaction.get(pedidoRef);

      if (!pedidoSnap.exists()) {
        throw new Error("Pedido não encontrado");
      }

      const pedido = pedidoSnap.data();
      const statusAtual = (pedido.status || "novo").toLowerCase();
      const itens = Array.isArray(pedido.itens) ? pedido.itens : [];

      // Só devolve estoque se estiver cancelando agora
      if (novoStatus === "cancelado" && statusAtual !== "cancelado") {
        // 1) LER todos os produtos primeiro
        const produtosLidos = [];

        for (const item of itens) {
          if (!item.produtoId) continue;

          const produtoRef = doc(db, "Produtos", item.produtoId);
          const produtoSnap = await transaction.get(produtoRef);

          if (!produtoSnap.exists()) continue;

          produtosLidos.push({
            item,
            produtoRef,
            produto: produtoSnap.data()
          });
        }

        // 2) SÓ DEPOIS fazer os updates
        for (const dado of produtosLidos) {
          const estoque = dado.produto.estoque || {};
          const chaveEstoque = dado.item.opcao || "unico";
          const atual = Number(estoque[chaveEstoque] || 0);
          const qtd = Number(dado.item.qtd || 0);

          transaction.update(dado.produtoRef, {
            [`estoque.${chaveEstoque}`]: atual + qtd
          });
        }
      }

      transaction.update(pedidoRef, {
        status: novoStatus
      });
    });

    alert(`Pedido atualizado para: ${novoStatus}`);
  } catch (erro) {
    console.error("Erro ao atualizar status do pedido:", erro);
    alert("Erro ao atualizar status.");
  }
};


function atualizarSelect(selectId, stockId) {
  let select = document.getElementById(selectId);
  if (!select) return;

  let id = stockId.replace("stock", "");
  let produto = produtos[id - 1];
  if (!produto) return;

  let estoque = produto.estoque || {};

  for (let i = 0; i < select.options.length; i++) {
    let option = select.options[i];
    let op = option.value;

    if (!op) continue;

    let textoOriginal = op;
    let qtd = Number(estoque[op] || 0);

    if (qtd <= 0) {
      option.disabled = true;
      option.text = textoOriginal + " (Esgotado)";
    } else {
      option.disabled = false;
      option.text = textoOriginal;
    }
  }
}

async function limparReservas() {
  let agora = Date.now();
  let mudou = false;

  for (let i = carrinho.length - 1; i >= 0; i--) {
    let item = carrinho[i];

    if (agora - item.tempo > tempoReserva) {
      await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);
      carrinho.splice(i, 1);
      mudou = true;
    }
  }

  if (mudou) {
    salvarCarrinhoLocal();
    atualizarCarrinho();
  }
}

window.exportarRelatorioCSV = async function () {
  try {
    const snapshot = await getDocs(collection(db, "Pedidos"));

    let linhas = [
      ["Data", "Pagamento", "Entrega", "Total", "Itens"]
    ];

    snapshot.forEach(docSnap => {
      let pedido = docSnap.data();

      let data = pedido.criadoEm?.toDate
        ? pedido.criadoEm.toDate().toLocaleString("pt-BR")
        : "";

      let itens = Array.isArray(pedido.itens)
        ? pedido.itens.map(i => `${i.nome} (${i.qtd})`).join(" | ")
        : "";

      linhas.push([
        data,
        pedido.pagamento || "",
        pedido.entrega || "",
        pedido.total || 0,
        itens
      ]);
    });

    let csv = linhas.map(l =>
      l.map(v => `"${String(v).replace(/"/g, '""')}"`).join(";")
    ).join("\n");

    // ✅ BOM para Excel reconhecer UTF-8 corretamente
    let csvComBOM = "\uFEFF" + csv;

    let blob = new Blob([csvComBOM], { type: "text/csv;charset=utf-8;" });
    let url = URL.createObjectURL(blob);

    let link = document.createElement("a");
    link.href = url;
    link.download = "relatorio_vendas.csv";
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);

    URL.revokeObjectURL(url);
  } catch (erro) {
    console.error("Erro ao exportar CSV:", erro);
    alert("Erro ao exportar relatório.");
  }
};

          <input id="p_pasta_${index}" value="${p.pasta}" style="width:100%; margin-bottom:8px;"><br>

          Imagem:<br>
          <input id="p_imagem_${index}" value="${p.imagem}" style="width:100%; margin-bottom:8px;"><br>

          Opções:<br>
          <input id="p_opcoes_${index}" value="${p.opcoes.join(",")}" style="width:100%; margin-bottom:8px;"><br>

          ${estoqueHTML}

          <div style="margin-top:12px;">
            <button onclick="removerProduto(${index})" style="
              background:red;
              color:white;
              border:none;
              padding:8px 10px;
              border-radius:6px;
              cursor:pointer;
            ">
              Excluir Produto
            </button>
          </div>
        </div>
      </div>
    `;
  });

  html += `
    </div>

    <div style="
      position:sticky;
      bottom:-18px;
      background:#fff;
      padding-top:14px;
      margin-top:18px;
      border-top:1px solid #ddd;
    ">
      <button onclick="salvarEdicaoProdutos()">Salvar Produtos</button>
    </div>
  `;

  container.innerHTML = html;
};

window.categoriaFiltroAtual = "todos";

window.filtrarCategoriaAdmin = function (categoria) {
  window.categoriaFiltroAtual = (categoria || "todos").toLowerCase();
  window.filtrarProdutosAdmin();
};

window.filtrarProdutosAdmin = function () {
  let busca = document.getElementById("buscaProdutoAdmin")?.value.toLowerCase() || "";
  let cards = document.querySelectorAll(".cardProdutoAdmin");
  let totalVisivel = 0;

  cards.forEach(card => {
    let nome = card.getAttribute("data-nome") || "";
    let categoria = card.getAttribute("data-categoria") || "";

    let passaBusca = nome.includes(busca);
    let passaCategoria =
      window.categoriaFiltroAtual === "todos" ||
      categoria === window.categoriaFiltroAtual;

    if (passaBusca && passaCategoria) {
      card.style.display = "block";
      totalVisivel++;
    } else {
      card.style.display = "none";
    }
  });

  let contador = document.getElementById("contadorProdutosAdmin");
  if (contador) {
    contador.innerHTML = `Total: ${produtos.length} | Mostrando: ${totalVisivel}`;
  }
};


window.renderSecaoPedidosAdmin = function () {
  let container = document.getElementById("adminConteudoPrincipal");
  if (!container) return;

  container.innerHTML = `
    <h2 style="margin-top:0;">Pedidos</h2>

    <div style="display:flex; gap:10px; flex-wrap:wrap; margin-bottom:16px;">
      <button onclick="filtrarPedidosAdmin('todos')">Todos</button>
      <button onclick="filtrarPedidosAdmin('novo')">Novos</button>
      <button onclick="filtrarPedidosAdmin('separando')">Separando</button>
      <button onclick="filtrarPedidosAdmin('pronto')">Prontos</button>
      <button onclick="filtrarPedidosAdmin('entregue')">Entregues</button>
      <button onclick="filtrarPedidosAdmin('cancelado')">Cancelados</button>
    </div>

    <div id="listaPedidosAdmin">Carregando...</div>
  `;

  window.filtrarPedidosAdmin("todos");
};

window.filtrarPedidosAdmin = function (statusFiltro = "todos") {
  statusFiltroPedidosAtual = statusFiltro;

  if (unsubscribePedidosAdmin) {
    unsubscribePedidosAdmin();
    unsubscribePedidosAdmin = null;
  }

  const pedidosRef = query(
    collection(db, "Pedidos"),
    orderBy("criadoEm", "desc")
  );

    unsubscribePedidosAdmin = onSnapshot(pedidosRef, (snapshot) => {
    let lista = document.getElementById("listaPedidosAdmin");
    if (!lista) return;

    let pedidosHTML = `
      <div style="
        display:grid;
        grid-template-columns:repeat(auto-fit, minmax(320px, 1fr));
        gap:14px;
      ">
    `;

    let encontrou = false;

    snapshot.forEach((docSnap) => {
      let p = docSnap.data();
      let status = (p.status || "novo").toLowerCase();

      if (statusFiltro !== "todos" && status !== statusFiltro) {
        return;
      }

      encontrou = true;

      let itens = Array.isArray(p.itens)
        ? p.itens.map(i => `${i.nome} (${i.qtd}x)`).join("<br>")
        : "Sem itens";

      let dataPedido = p.criadoEm?.toDate
        ? p.criadoEm.toDate().toLocaleString("pt-BR")
        : "";

      let corStatus = "#666";
      let fundoStatus = "#f3f3f3";

      if (status === "novo") {
        corStatus = "#8a6d00";
        fundoStatus = "#fff7d6";
      } else if (status === "separando") {
        corStatus = "#9a4d00";
        fundoStatus = "#ffe8cc";
      } else if (status === "pronto") {
        corStatus = "#0b5394";
        fundoStatus = "#d9ecff";
      } else if (status === "entregue") {
        corStatus = "#0f6b2f";
        fundoStatus = "#dff7e5";
      } else if (status === "cancelado") {
        corStatus = "#a61b1b";
        fundoStatus = "#ffe0e0";
      }

      const botaoStyle = `
        border:none;
        padding:6px 10px;
        border-radius:6px;
        cursor:pointer;
        background:#f3f3f3;
      `;

      pedidosHTML += `
        <div style="
          border:1px solid #ccc;
          border-radius:12px;
          padding:12px;
          background:#fff;
          box-shadow:0 2px 8px rgba(0,0,0,0.06);
        ">
          <div style="
            display:inline-block;
            padding:4px 10px;
            border-radius:999px;
            background:${fundoStatus};
            color:${corStatus};
            font-weight:bold;
            margin-bottom:10px;
            text-transform:capitalize;
          ">
            ${status}
          </div><br>

          <b>Data:</b> ${dataPedido}<br>
          <b>Pagamento:</b> ${p.pagamento || "-"}<br>
          <b>Entrega:</b> ${p.entrega || "-"}<br>
          <b>Total:</b> R$ ${Number(p.total || 0).toFixed(2)}<br><br>

          <b>Itens:</b><br>${itens}<br><br>

          <div style="display:flex; gap:8px; flex-wrap:wrap;">
            <button style="${botaoStyle}" onclick="atualizarStatusPedido('${docSnap.id}','novo')">🟡 Novo</button>
            <button style="${botaoStyle}" onclick="atualizarStatusPedido('${docSnap.id}','separando')">🟠 Separando</button>
            <button style="${botaoStyle}" onclick="atualizarStatusPedido('${docSnap.id}','pronto')">🔵 Pronto</button>
            <button style="${botaoStyle}" onclick="atualizarStatusPedido('${docSnap.id}','entregue')">🟢 Entregue</button>
            <button style="${botaoStyle}" onclick="atualizarStatusPedido('${docSnap.id}','cancelado')">🔴 Cancelado</button>
          </div>
        </div>
      `;
    });

    pedidosHTML += `</div>`;

    lista.innerHTML = encontrou ? pedidosHTML : "Nenhum pedido nesse filtro.";
  });
};

window.loginAdmin = async function () {
  let email = prompt("Email admin:");
  let senha = prompt("Senha:");

  if (!email || !senha) return;

  try {
    await signInWithEmailAndPassword(auth, email, senha);
    alert("Login realizado!");
    window.abrirAdmin();
  } catch (erro) {
    console.error("Erro login:", erro);
    alert("Email ou senha inválidos.");
  }
};

window.logoutAdmin = async function () {
  try {
    await signOut(auth);
    alert("Logout realizado.");
    if (window.painelAdmin) {
      window.fecharAdmin();
    }
  } catch (erro) {
    console.error("Erro no logout:", erro);
    alert("Erro ao sair.");
  }
};

window.criarProduto = async function () {
  let nome = document.getElementById("novo_nome").value.trim();
  let marca = document.getElementById("novo_marca").value.trim() || "";
  let categoria = document.getElementById("novaCategoria").value.trim() || "";
  let preco = parseFloat(document.getElementById("novo_preco").value);
  let pasta = document.getElementById("novo_pasta").value.trim() || "";
  let imagem = document.getElementById("novo_imagem").value.trim() || "";
  let promocao = document.getElementById("novaPromocao").checked;

  let opcoesTexto = document.getElementById("novo_opcoes").value.trim();
  let opcoes = opcoesTexto
    ? opcoesTexto.split(",").map(o => o.trim()).filter(o => o)
    : [];

  if (!nome) {
    alert("Informe o nome do produto");
    return;
  }

  if (isNaN(preco) || preco <= 0) {
    alert("Informe um preço válido");
    return;
  }

  let estoque = {};

  if (opcoes.length > 0) {
    opcoes.forEach(op => {
      estoque[op] = 0;
    });
  } else {
    estoque = { unico: 0 };
  }

  let novo = {
    nome,
    marca,
    categoria,
    promocao,
    preco,
    ordem: 999,
    pasta,
    imagem,
    opcoes,
    estoque
  };

  try {
    await addDoc(collection(db, "Produtos"), novo);
    alert("Produto criado no Firebase!");
    window.fecharAdmin();
  } catch (erro) {
    console.error("Erro ao criar produto:", erro);
    alert("Erro ao criar produto no Firebase.");
  }
};

window.salvarEdicaoProdutos = async function () {
  try {
    // 1) Congela a lista atual para não depender da reordenação do onSnapshot
    const produtosAtuais = [...produtos];

    // 2) Lê TODOS os dados da tela antes de começar a salvar
    const dadosAtualizados = produtosAtuais.map((p, index) => {
      let nome = document.getElementById(`p_nome_${index}`)?.value.trim() || "";
      let marca = document.getElementById(`p_marca_${index}`)?.value.trim() || "";
      let categoria = document.getElementById(`p_categoria_${index}`)?.value.trim() || "";
      let promocao = document.getElementById(`p_promocao_${index}`)?.checked || false;
      let preco = parseFloat(document.getElementById(`p_preco_${index}`)?.value || 0);
      let ordem = parseInt(document.getElementById(`p_ordem_${index}`)?.value || 999);
      let pasta = document.getElementById(`p_pasta_${index}`)?.value.trim() || "";
      let imagem = document.getElementById(`p_imagem_${index}`)?.value.trim() || "";
      let opcoesTexto = document.getElementById(`p_opcoes_${index}`)?.value.trim() || "";

      let novasOpcoes = opcoesTexto
        ? opcoesTexto.split(",").map(o => o.trim()).filter(o => o)
        : [];

      let novoEstoque = {};

      if (novasOpcoes.length > 0) {
        novasOpcoes.forEach(op => {
          let campo = document.getElementById(`p_estoque_${index}_${op}`);
          novoEstoque[op] = campo ? parseInt(campo.value || 0) : 0;
        });
      } else {
        let campoUnico = document.getElementById(`p_estoque_${index}_unico`);
        novoEstoque = {
          unico: campoUnico ? parseInt(campoUnico.value || 0) : 0
        };
      }

      return {
        id: p.id,
        nome,
        marca,
        categoria,
        promocao,
        preco,
        ordem,
        pasta,
        imagem,
        opcoes: novasOpcoes,
        estoque: novoEstoque
    };
    });

    // 3) Agora salva tudo
    for (const item of dadosAtualizados) {
      await updateDoc(doc(db, "Produtos", item.id), {
        nome: item.nome,
        marca: item.marca,
        categoria: item.categoria,
        promocao: item.promocao,
        preco: item.preco,
        ordem: item.ordem,
        pasta: item.pasta,
        imagem: item.imagem,
        opcoes: item.opcoes,
        estoque: item.estoque
      });
    }

    alert("Produtos e estoques atualizados com sucesso!");
  } catch (erro) {
    console.error("Erro ao salvar produtos:", erro);
    alert("Erro ao salvar edição dos produtos.");
  }
};

window.removerProduto = async function (index) {
  let confirmar = confirm("Tem certeza que deseja excluir este produto?");
  if (!confirmar) return;

  try {
    let produtoId = produtos[index].id;
    await deleteDoc(doc(db, "Produtos", produtoId));
    alert("Produto removido do Firebase!");
    await carregarProdutosFirebase();
    window.fecharAdmin();
  } catch (erro) {
    console.error("Erro ao remover produto:", erro);
    alert("Erro ao remover produto do Firebase.");
  }
};

window.fecharAdmin = function () {
  if (unsubscribePedidosAdmin) {
    unsubscribePedidosAdmin();
    unsubscribePedidosAdmin = null;
  }

  if (window.painelAdmin) {
    window.painelAdmin.remove();
    window.painelAdmin = null;
  }
};

window.salvarAdmin = function () {
  alert("O estoque ainda não está online nesta etapa.");
};

window.onload = async function () {
  carregarProdutosFirebase();
  configurarEventosCarrinho();
  await carregarCarrinhoLocal();
  atualizarCarrinho();
};

setInterval(limparReservas, 5000);
