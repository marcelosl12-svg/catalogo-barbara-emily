<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Catálogo Bárbara Emily</title>

<style>

body{
font-family:Arial;
margin:0;
background:#f3f3f3;
}



/* HEADER */

header{
background:linear-gradient(45deg,#8b0000);
color:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:12px 15px;
box-shadow:0 3px 10px rgba(0,0,0,0.2);
}

.logoArea{
display:flex;
align-items:center;
gap:10px;
}

.logo{
width:40px;
height:40px;
border-radius:50%;
}

.stock{
font-size:14px;
line-height:1.5;
margin-top:5px;
}

.cartIcon{
background:white;
width:42px;
height:42px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
position:relative;
font-size:20px;
}

.cartBadge{
position:absolute;
top:-5px;
right:-5px;
background:black;
color:white;
font-size:12px;
border-radius:50%;
width:18px;
height:18px;
display:flex;
align-items:center;
justify-content:center;
}



/* PRODUTOS */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;
padding:15px;
}

.card{
background:white;
border-radius:12px;
padding:10px;
box-shadow:0 4px 10px rgba(0,0,0,0.15);
transition:0.2s;
}

.card:hover{
transform:scale(1.02);
}

.card img{
width:100%;
height:150px;
object-fit:contain;
background:#fff;
}

.price{
font-weight:bold;
color:#8b0000;
font-size:18px;
margin-top:5px;
}

.stock{
font-size:13px;
margin-top:3px;
}

.btn{
margin-top:8px;
width:100%;
padding:10px;
background:black;
color:white;
border:none;
border-radius:8px;
cursor:pointer;
transition:0.2s;
}

.btn:hover{
background:#333;
}



/* CARRINHO */

.cartPanel{
position:fixed;
top:0;
right:0;
width:320px;
height:100%;
background:#faf8f8;
padding:15px;
box-shadow:-5px 0 15px rgba(0,0,0,0.4);
display:none;
z-index:100;
overflow-y:auto;
}

.cartHeader{
display:flex;
justify-content:space-between;
align-items:center;
}

.closeBtn{
background:#eee;
border:none;
padding:6px 10px;
border-radius:5px;
cursor:pointer;
}

.cartItem{
display:flex;
justify-content:space-between;
align-items:center;
margin:10px 0;
}

.qtyControls{
display:flex;
align-items:center;
gap:5px;
}

.qtyBtn{
background:#7b3fa0;
color:white;
border:none;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
}

.removeBtn{
background:#f70707;
border:none;
color:white;
width:28px;
height:28px;
border-radius:6px;
cursor:pointer;
}

select, textarea{
width:100%;
margin-top:8px;
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

.instagramBtn{
width:100%;
padding:10px;
background:#800000;
color:white;
border:none;
border-radius:6px;
margin-top:8px;
cursor:pointer;
}

.totalBox{
color:#800000;
font-weight:bold;
font-size:20px;
padding:6px 10px;
border-radius:8px;
display:inline-block;
}



/* Titulo */

.titulo{
font-size:clamp(15px, 4vw, 24px);
font-weight:bold;
}

</style>
</head>

<body>

<header>
 <div class="logoArea">
<img src="imagens/00/perfil.jpg" class="logo">
<b class="titulo">Catálogo Bárbara Emily</b>
</div>


  <div class="cartIcon" onclick="toggleCarrinho()">
🛒
<span id="cartBadge" class="cartBadge">0</span>
</div>


</header>




<!-- PRODUTOS -->


<!-- PRODUTOS AUTOMÁTICOS -->

<div class="grid" id="produtosContainer"></div>




<!-- CARRINHO -->

<div id="cartPanel" class="cartPanel">

<div class="cartHeader">
<b>Carrinho</b>
<button class="closeBtn" onclick="toggleCarrinho()">Fechar</button>
</div>

<p class="totalBox">Total: R$ <span id="total">0.00</span></p>

<select id="pagamento">
<option value="">Forma de pagamento</option>
<option>Dinheiro</option>
<option>PIX</option>
<option>Cartão</option>
</select>

<select id="entrega">
<option value="0">Opções de entrega</option>
<option value="0">Retirar na loja</option>
<option value="0">Via Uber flash (por conta do cliente)</option>
</select>

<div id="lista"></div>

<button class="btn" onclick="gerarPedido()">Gerar pedido</button>
<button class="btn" onclick="limparCarrinho()">Limpar</button>

<button class="instagramBtn"
onclick="window.open('https://ig.me/m/barbaraemilybe','_blank')">
Abrir Instagram
</button>

<textarea id="pedido"></textarea>

</div>



<!-- MODAL -->


<script>

let carrinho=[]

let produtos = [
{
nome: "Hidratante Labial",
marca: "Sarah’s Beauty",
preco: 6.5,
pasta: "Hidratante-Labial",
imagem: "1.jpg",
id: "1",
opcoes: ["Morango","Melancia"]
},
{
nome: "Candy pop lip gloss",
marca: "Lua&Neve",
preco: 8.0,
pasta: "Candy-pop-lip-gloss",
imagem: "2.jpg",
id: "2",
opcoes: ["Roxo","Rosa"]
}
]

// salvar produtos
function salvarProdutos(){
localStorage.setItem("produtos", JSON.stringify(produtos))
}

// carregar produtos
function carregarProdutos(){
let dados = localStorage.getItem("produtos")
if(dados){
produtos = JSON.parse(dados)
}
}

let estoques = {
stock1: { Morango: 2, Melancia: 1 },
stock2: { Roxo: 4, Rosa: 3 }
}

function gerarProdutos(){

let container = document.getElementById("produtosContainer")
container.innerHTML = ""

produtos.forEach((p, index)=>{

let id = index + 1

let opcoesHTML = `<option value="">Opções</option>`

p.opcoes.forEach(op=>{
opcoesHTML += `<option value="${op}.jpg">${op}</option>`
})

container.innerHTML += `
<div class="card">

<img id="img${id}" 
src="imagens/${p.pasta}/${p.imagem}"
onerror="this.onerror=null; this.src='imagens/sem-imagem.jpg'">

<h3>${p.nome} - ${p.marca}</h3>

<div class="price">R$ ${p.preco.toFixed(2)}</div>

<div class="stock" id="stock${id}"></div>

<select id="op${id}" onchange="trocarImagem('op${id}','img${id}','${p.pasta}')">
${opcoesHTML}
</select>

<button class="btn"
onclick="addProduto('${p.nome}',${p.preco},'op${id}','stock${id}')">
Adicionar
</button>

</div>
`

})

}

function trocarImagem(selectId, imgId, pasta){

let select = document.getElementById(selectId)
let img = document.getElementById(imgId)

let novaImagem = select.value

if(!novaImagem){
return
}

img.src = "imagens/" + pasta + "/" + novaImagem

img.onerror = function(){
this.onerror = null
this.src = "imagens/sem-imagem.jpg"
}

// 🔥 MOSTRAR ESTOQUE DA OPÇÃO
let id = selectId.replace("op","")
mostrarEstoque("stock" + id)

}


function mostrarEstoque(stockId){

let id = stockId.replace("stock","")
let select = document.getElementById("op"+id)
let div = document.getElementById(stockId)
let dados = estoques[stockId]

// 🔥 se tiver opção selecionada
if(select && select.selectedIndex > 0){

let opcao = select.options[select.selectedIndex].text
let qtd = dados[opcao] || 0

if(qtd <= 0){
div.innerHTML = `🔴 ${opcao}: Esgotado`
}else{
div.innerHTML = `🟢 ${opcao}: ${qtd}`
}

return
}

div.innerHTML = `<b>Selecione uma opção</b>`

}

function mostrarEstoqueOpcao(stockId, opcao){

let div = document.getElementById(stockId)
let dados = estoques[stockId]

let qtd = dados[opcao] || 0

let html = `<b>Estoque:</b><br><br>`

if(qtd <= 0){
html += `🔴 ${opcao}: Esgotado`
}else{
html += `🟢 ${opcao}: ${qtd}`
}

div.innerHTML = html
}


let tempoReserva = 5 * 60 * 1000 // 5 minutos

function toggleCarrinho(){
let c=document.getElementById("cartPanel")
c.style.display=c.style.display==="block"?"none":"block"
}

function atualizarCarrinho(){

let lista=document.getElementById("lista")
lista.innerHTML=""

let total=0
let qtd=0

carrinho.forEach((item,index)=>{

let sub=item.preco*item.qtd
total+=sub
qtd+=item.qtd

lista.innerHTML+=`
<div class="cartItem">
<div>
${item.nome}<br>
R$ ${item.preco.toFixed(2)}
</div>

<div class="qtyControls">
<button class="qtyBtn" onclick="diminuir(${index})">-</button>
<b>${item.qtd}</b>
<button class="qtyBtn" onclick="aumentar(${index})">+</button>
<button class="removeBtn" onclick="remover(${index})">X</button>
</div>
</div>
`
})

let taxa=parseFloat(document.getElementById("entrega").value || 0)

total+=taxa

document.getElementById("total").innerText=total.toFixed(2)
document.getElementById("cartBadge").innerText=qtd

}

function addProduto(nome,preco,selectId,stockId){

let select = document.getElementById(selectId)
let opcaoTexto = select.options[select.selectedIndex].text

if(opcaoTexto === "Opções"){
alert("Selecione uma opção")
return
}

if(estoques[stockId][opcaoTexto] <= 0){
alert("Produto esgotado")
return
}

estoques[stockId][opcaoTexto]--

let nomeFinal = nome + " – " + opcaoTexto

let item = carrinho.find(i=>i.nome===nomeFinal)

if(item){
item.qtd++
}else{

carrinho.push({
nome:nomeFinal,
preco:preco,
qtd:1,
stockId:stockId,
opcao:opcaoTexto,
tempo: Date.now()
})
}

mostrarEstoque(stockId)
atualizarSelect(selectId, stockId)
atualizarCarrinho()
salvarDados()

}

function aumentar(i){

let item = carrinho[i]

if(estoques[item.stockId][item.opcao] <= 0) return

item.qtd++
estoques[item.stockId][item.opcao]--

item.tempo = Date.now()

mostrarEstoque(item.stockId)
let id = item.stockId.replace("stock","")
atualizarSelect("op"+id, item.stockId)
atualizarCarrinho()
salvarDados()

}

function diminuir(i){

let item = carrinho[i]

item.qtd--
estoques[item.stockId][item.opcao]++

if(item.qtd<=0){
carrinho.splice(i,1)
}

mostrarEstoque(item.stockId)
let id = item.stockId.replace("stock","")
atualizarSelect("op"+id, item.stockId)
atualizarCarrinho()
salvarDados()

}

function remover(i){

let item = carrinho[i]

estoques[item.stockId][item.opcao]+=item.qtd

carrinho.splice(i,1)

mostrarEstoque(item.stockId)
let id = item.stockId.replace("stock","")
atualizarSelect("op"+id, item.stockId)
atualizarCarrinho()
salvarDados()

}

function limparCarrinho(){
carrinho.forEach(item=>{
estoques[item.stockId][item.opcao] += item.qtd
})

carrinho=[]

for(let stockId in estoques){
mostrarEstoque(stockId)

let id = stockId.replace("stock","")
atualizarSelect("op"+id, stockId)
}

atualizarCarrinho()
salvarDados()
}

function gerarPedido(){

if(carrinho.length==0){
alert("Carrinho vazio")
return
}

let pagamento=document.getElementById("pagamento").value
let taxa=parseFloat(document.getElementById("entrega").value || 0)

let texto="Pedido\n\n"
let total=0

carrinho.forEach(i=>{
let sub=i.preco*i.qtd
total+=sub
texto+=`${i.nome}\n${i.qtd}Un R$ ${i.preco.toFixed(2)}\n\n`
})

total+=taxa

texto+=`Entrega: R$ ${taxa.toFixed(2)}\n`
texto+=`Pagamento: ${pagamento}\n`
texto+=`Total: R$ ${total.toFixed(2)}`

document.getElementById("pedido").value=texto
navigator.clipboard.writeText(texto)

alert("Pedido copiado!")
}


function atualizarSelect(selectId, stockId){

let select = document.getElementById(selectId)
let dados = estoques[stockId]

for(let i=0;i<select.options.length;i++){

let op = select.options[i].text.replace(" (Esgotado)","")

if(dados[op] <= 0){
select.options[i].disabled = true
select.options[i].text = op + " (Esgotado)"
}else{
select.options[i].disabled = false
select.options[i].text = op
}

}

}

function limparReservas(){

let agora = Date.now()

for(let i = carrinho.length -1; i >= 0; i--){

let item = carrinho[i]

if(agora - item.tempo > tempoReserva){

// devolve estoque
estoques[item.stockId][item.opcao] += item.qtd

// remove do carrinho
carrinho.splice(i,1)

}

}

for(let stockId in estoques){
mostrarEstoque(stockId)
atualizarSelect(stockId.replace("stock","op"), stockId)
}

atualizarCarrinho()
salvarDados()

}


function salvarDados(){
localStorage.setItem("estoques", JSON.stringify(estoques))
}

function carregarDados(){
let dados = localStorage.getItem("estoques")
if(dados){
estoques = JSON.parse(dados)
}
}

// ===== ADMIN OCULTO =====

let senhaAdmin = "1234"

document.addEventListener("keydown", function(e){

// tecla secreta: CTRL + ALT + A
if(e.ctrlKey && e.altKey && e.key.toLowerCase() === "a"){

let senha = prompt("Senha do administrador:")

if(senha === senhaAdmin){
abrirAdmin()
}else{
alert("Senha incorreta")
}

}

})

function abrirAdmin(){

let painel = document.createElement("div")

painel.style.position = "fixed"
painel.style.top = "50%"
painel.style.left = "50%"
painel.style.transform = "translate(-50%,-50%)"
painel.style.background = "#fff"
painel.style.padding = "20px"
painel.style.borderRadius = "10px"
painel.style.boxShadow = "0 0 20px rgba(0,0,0,0.3)"
painel.style.zIndex = "9999"
painel.style.width = "320px"
painel.style.maxHeight = "90%"
painel.style.overflowY = "auto"

let html = "<h3>ADMIN</h3>"

// ===== ESTOQUE =====
for(let stockId in estoques){

html += "<b>"+stockId+"</b><br>"

for(let op in estoques[stockId]){

html += `
${op}: <input type="number" value="${estoques[stockId][op]}" id="adm_${stockId}_${op}" style="width:60px"><br>
`

}

html += "<br>"
}

html += `<hr><h4>Produtos</h4>`

produtos.forEach((p, index)=>{

html += `
<div style="border:1px solid #ccc;padding:5px;margin-bottom:8px">

<b>Produto ${index+1}</b><br>

Nome: <input id="p_nome_${index}" value="${p.nome}"><br>
Marca: <input id="p_marca_${index}" value="${p.marca}"><br>
Preço: <input type="number" id="p_preco_${index}" value="${p.preco}"><br>
Pasta: <input id="p_pasta_${index}" value="${p.pasta}"><br>
Imagem: <input id="p_imagem_${index}" value="${p.imagem}"><br>
Opções: <input id="p_opcoes_${index}" value="${p.opcoes.join(",")}"><br>

<button onclick="removerProduto(${index})" style="background:red;color:white;border:none;padding:5px;border-radius:5px;margin-top:5px;">
Excluir Produto
</button>

</div>
`
})

// ===== NOVO PRODUTO =====
html += `
<hr>
<h4>Novo Produto</h4>

<input id="novo_nome" placeholder="Nome"><br><br>
<input id="novo_marca" placeholder="Marca"><br><br>
<input id="novo_preco" type="number" placeholder="Preço"><br><br>
<input id="novo_pasta" placeholder="Nome da pasta da imagem"><br><br>
<input id="novo_opcoes" placeholder="Opções (ex: Azul,Verde,Rosa)"><br><br>
<input id="novo_imagem" placeholder="Imagem principal (ex: 1.jpg)">
`

html += `
<button onclick="salvarAdmin()">Salvar Estoque</button>
<button onclick="salvarEdicaoProdutos()">Salvar Produtos</button>
<button onclick="criarProduto()">Criar Produto</button>
<button onclick="fecharAdmin()">Fechar</button>
`

painel.innerHTML = html

document.body.appendChild(painel)

window.painelAdmin = painel
}

function criarProduto(){

let nome = document.getElementById("novo_nome").value
let marca = document.getElementById("novo_marca").value
let preco = parseFloat(document.getElementById("novo_preco").value)
let pasta = document.getElementById("novo_pasta").value
let opcoes = document.getElementById("novo_opcoes").value.split(",").map(o => o.trim())
let imagem = document.getElementById("novo_imagem").value

if(!nome || !marca || !preco || !pasta || !imagem || opcoes.length == 0){
alert("Preencha tudo")
return
}

let novo = {
nome: nome,
marca: marca,
preco: preco,
pasta: pasta,
imagem: imagem, // 🔥 AGORA CERTO
id: (produtos.length + 1).toString(),
opcoes: opcoes.map(o=>o.trim())
}

produtos.push(novo)



// cria estoque automático
let stockId = "stock" + produtos.length
estoques[stockId] = {}

opcoes.forEach(op=>{
estoques[stockId][op.trim()] = 0
})

// salva tudo
salvarProdutos()
salvarDados()

// recria catálogo
gerarProdutos()

produtos.forEach((p, index)=>{
let id = index + 1
mostrarEstoque("stock"+id)
atualizarSelect("op"+id,"stock"+id)
})

alert("Produto criado!")

fecharAdmin()
}

function salvarEdicaoProdutos(){

produtos.forEach((p, index)=>{

let nome = document.getElementById(`p_nome_${index}`).value
let marca = document.getElementById(`p_marca_${index}`).value
let preco = parseFloat(document.getElementById(`p_preco_${index}`).value)
let pasta = document.getElementById(`p_pasta_${index}`).value
let imagem = document.getElementById(`p_imagem_${index}`).value || "1.jpg"
let opcoes = document.getElementById(`p_opcoes_${index}`).value.split(",")

produtos[index] = {
nome: nome,
marca: marca,
preco: preco,
pasta: pasta,
imagem: imagem,
id: (index+1).toString(),
opcoes: opcoes.map(o=>o.trim())
}

// 🔥 ATUALIZA ESTOQUE SE MUDAR OPÇÕES
let stockId = "stock" + (index+1)

if(!estoques[stockId]){
estoques[stockId] = {}
}

let novoEstoque = {}

opcoes.forEach(op=>{
op = op.trim()
novoEstoque[op] = estoques[stockId][op] || 0
})

estoques[stockId] = novoEstoque

})

// salva
salvarProdutos()
salvarDados()

// recria tela
gerarProdutos()

produtos.forEach((p, index)=>{
let id = index + 1
mostrarEstoque("stock"+id)
atualizarSelect("op"+id,"stock"+id)
})

alert("Produtos atualizados!")

fecharAdmin()
}

function removerProduto(index){

let confirmar = confirm("Tem certeza que deseja excluir este produto?")
if(!confirmar) return

// 🔥 remove produto
produtos.splice(index,1)

// 🔥 remove estoque correspondente
let novoEstoques = {}

produtos.forEach((p, i)=>{
let antigoId = "stock" + (i+1)
let novoId = "stock" + (i+1)

// mantém estoque se existir
novoEstoques[novoId] = estoques[antigoId] || {}
})

estoques = novoEstoques

// 🔥 salva tudo
salvarProdutos()
salvarDados()

// 🔥 recria catálogo
gerarProdutos()

produtos.forEach((p, i)=>{
let id = i + 1
mostrarEstoque("stock"+id)
atualizarSelect("op"+id,"stock"+id)
})

alert("Produto removido!")

fecharAdmin()
}

function fecharAdmin(){
painelAdmin.remove()
}

function salvarAdmin(){

for(let stockId in estoques){
for(let op in estoques[stockId]){

let campo = document.getElementById(`adm_${stockId}_${op}`)
estoques[stockId][op] = parseInt(campo.value) || 0

}
}

salvarDados() // 🔥 salva de verdade

// atualiza tela
for(let stockId in estoques){
mostrarEstoque(stockId)

let id = stockId.replace("stock","")
atualizarSelect("op"+id, stockId)
}

alert("Estoque atualizado!")

fecharAdmin()

}

window.onload = function(){

carregarDados()
carregarProdutos() // 🔥 NOVO

gerarProdutos()

produtos.forEach((p, index)=>{
let id = index + 1

// cria estoque se não existir
if(!estoques["stock"+id]){
estoques["stock"+id] = {}
p.opcoes.forEach(op=>{
estoques["stock"+id][op] = 0
})
}

mostrarEstoque("stock"+id)
atualizarSelect("op"+id,"stock"+id)
})

}

setInterval(limparReservas, 5000) // verifica a cada 5 segundos

</script>

</body>
</html>
