const app = initializeApp(firebaseConfig);

let carrinho = [];
let produtos = [];

// salvar produtos
function salvarProdutos(){
localStorage.setItem("produtos", JSON.stringify(produtos))
}

// carregar produtos
function carregarProdutos(){
let dados = localStorage.getItem("produtos")
if(dados){
produtos = JSON.parse(dados)
}
}

let estoques = {
stock1: { Morango: 2, Melancia: 1 },

// 🔥 CARREGAR PRODUTOS DO FIREBASE
function carregarProdutosFirebase() {
  onSnapshot(collection(db, "Produtos"), (snapshot) => {
    produtos = snapshot.docs.map(docSnap => ({
      id: docSnap.id,
      ...docSnap.data()
    }));

    gerarProdutos();

    produtos.forEach((p, index) => {
      let id = index + 1;
      mostrarEstoque("stock" + id);
      atualizarSelect("op" + id, "stock" + id);
    });
  }, (erro) => {
    console.error("Erro ao ouvir produtos do Firebase:", erro);
    alert("Erro ao atualizar produtos em tempo real.");
  });
}

function gerarProdutos() {
  let container = document.getElementById("produtosContainer");
  container.innerHTML = "";

  produtos.forEach((p, index) => {
    let idTela = index + 1;

    let opcoesHTML = `<option value="">Opções</option>`;
    p.opcoes.forEach(op => {
      opcoesHTML += `<option value="${op}.jpg">${op}</option>`;
    });

    container.innerHTML += `
      <div class="card">
        <img id="img${idTela}" 
          src="imagens/${p.pasta}/${p.imagem}"
          onerror="this.onerror=null; this.src='imagens/sem-imagem.jpg'">

        <h3>${p.nome} - ${p.marca}</h3>

        <div class="price">R$ ${Number(p.preco).toFixed(2)}</div>

        <div class="stock" id="stock${idTela}"><b>Selecione uma opção</b></div>

        <select id="op${idTela}" onchange="trocarImagem('op${idTela}','img${idTela}','${p.pasta}')">
          ${opcoesHTML}
        </select>

        <button class="btn" onclick="addProduto('${p.id}','op${idTela}')">
          Adicionar
        </button>
      </div>
    `;
  });
}

window.trocarImagem = function (selectId, imgId, pasta) {
  let select = document.getElementById(selectId);
  let img = document.getElementById(imgId);

  let novaImagem = select.value;

  if (novaImagem) {
    img.src = "imagens/" + pasta + "/" + novaImagem;
    img.onerror = function () {
      this.onerror = null;
      this.src = "imagens/sem-imagem.jpg";
    };
  }

  let id = selectId.replace("op", "");
  mostrarEstoque("stock" + id);
};


function mostrarEstoque(stockId) {
  let id = stockId.replace("stock", "");
  let select = document.getElementById("op" + id);
  let div = document.getElementById(stockId);

  let produto = produtos[id - 1];
  if (!produto) return;

  let estoque = produto.estoque || {};

  if (select && select.selectedIndex > 0) {
    let opcao = select.options[select.selectedIndex].text.replace(" (Esgotado)", "");
    let qtd = estoque[opcao] || 0;

    if (qtd <= 0) {
      div.innerHTML = `🔴 ${opcao}: Esgotado`;
    } else {
      div.innerHTML = `🟢 ${opcao}: ${qtd}`;
    }
    return;
  }

  div.innerHTML = `<b>Selecione uma opção</b>`;
}

function mostrarEstoqueOpcao(stockId, opcao){

let div = document.getElementById(stockId)
let dados = estoques[stockId]

let qtd = dados[opcao] || 0

let html = `<b>Estoque:</b><br><br>`

if(qtd <= 0){
html += `🔴 ${opcao}: Esgotado`
}else{
html += `🟢 ${opcao}: ${qtd}`
}

div.innerHTML = html
}

async function baixarEstoqueProduto(produtoId, opcao, quantidade = 1) {
  const produtoRef = doc(db, "Produtos", produtoId);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(produtoRef);

    if (!snap.exists()) {
      throw new Error("Produto não encontrado");
    }

    const dados = snap.data();
    const estoqueAtual = dados.estoque?.[opcao] || 0;

    if (estoqueAtual < quantidade) {
      throw new Error("Estoque insuficiente");
    }

    transaction.update(produtoRef, {
      [`estoque.${opcao}`]: estoqueAtual - quantidade
    });
  });
}

async function devolverEstoqueProduto(produtoId, opcao, quantidade = 1) {
  const produtoRef = doc(db, "Produtos", produtoId);

  await runTransaction(db, async (transaction) => {
    const snap = await transaction.get(produtoRef);

    if (!snap.exists()) {
      throw new Error("Produto não encontrado");
    }

    const dados = snap.data();
    const estoqueAtual = dados.estoque?.[opcao] || 0;

    transaction.update(produtoRef, {
      [`estoque.${opcao}`]: estoqueAtual + quantidade
    });
  });
}

window.addProduto = async function(produtoId, selectId) {
  let produto = produtos.find(p => p.id === produtoId);
  if (!produto) return;

  let select = document.getElementById(selectId);
  let opcaoTexto = select.options[select.selectedIndex].text.replace(" (Esgotado)", "");

  if (!opcaoTexto || opcaoTexto === "Opções") {
    alert("Selecione uma opção");
    return;
  }

  try {
    await baixarEstoqueProduto(produtoId, opcaoTexto, 1);

    let nomeFinal = produto.nome + " – " + opcaoTexto;
    let item = carrinho.find(i => i.nome === nomeFinal);

    if (item) {
      item.qtd++;
      item.tempo = Date.now();
    } else {
      carrinho.push({
        produtoId: produto.id,
        nome: nomeFinal,
        preco: Number(produto.preco),
        qtd: 1,
        opcao: opcaoTexto,
        tempo: Date.now()
      });
    }

    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao adicionar produto:", erro);
    alert("Produto sem estoque disponível.");
  }
};

window.aumentar = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await baixarEstoqueProduto(item.produtoId, item.opcao, 1);

    item.qtd++;
    item.tempo = Date.now();

    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao aumentar item:", erro);
    alert("Produto sem estoque disponível.");
  }
};

window.diminuir = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await devolverEstoqueProduto(item.produtoId, item.opcao, 1);

    item.qtd--;

    if (item.qtd <= 0) {
      carrinho.splice(index, 1);
    }

    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao diminuir item:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.remover = async function(index) {
  let item = carrinho[index];
  if (!item) return;

  try {
    await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);

    carrinho.splice(index, 1);
    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao remover item:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.limparCarrinho = async function() {
  try {
    for (let item of carrinho) {
      await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);
    }

    carrinho = [];
    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao limpar carrinho:", erro);
    alert("Erro ao devolver estoque.");
  }
};

window.gerarPedido = async function () {
  if (carrinho.length === 0) {
    alert("Carrinho vazio");
    return;
  }

  let pagamento = document.getElementById("pagamento").value;
  let entregaSelect = document.getElementById("entrega");
  let entregaTexto = entregaSelect.options[entregaSelect.selectedIndex].text;
  let taxa = parseFloat(entregaSelect.value || 0);

  let texto = "Pedido\n\n";
  let total = 0;

  carrinho.forEach(i => {
    let sub = i.preco * i.qtd;
    total += sub;
    texto += `${i.nome}\n${i.qtd}Un R$ ${i.preco.toFixed(2)}\n\n`;
  });

  total += taxa;

  texto += `Entrega: ${entregaTexto}\n`;
  texto += `Taxa: R$ ${taxa.toFixed(2)}\n`;
  texto += `Pagamento: ${pagamento}\n`;
  texto += `Total: R$ ${total.toFixed(2)}`;

  try {
    await salvarPedidoFirebase();

    document.getElementById("pedido").value = texto;
    await navigator.clipboard.writeText(texto);

    alert("Pedido salvo no Firebase e copiado!");

    carrinho = [];
    atualizarCarrinho();
  } catch (erro) {
    console.error("Erro ao gerar pedido:", erro);
    alert("Erro ao salvar pedido.");
  }
};

window.concluirPedido = async function (pedidoId) {
  try {
    await updateDoc(doc(db, "Pedidos", pedidoId), {
      status: "concluido"
    });

    alert("Pedido concluído!");
  } catch (erro) {
    console.error("Erro ao concluir pedido:", erro);
    alert("Erro ao atualizar pedido.");
  }
};

async function salvarPedidoFirebase() {
  if (carrinho.length === 0) {
    throw new Error("Carrinho vazio");
  }

  let pagamento = document.getElementById("pagamento").value;
  let entregaSelect = document.getElementById("entrega");
  let entregaTexto = entregaSelect.options[entregaSelect.selectedIndex].text;
  let taxa = parseFloat(entregaSelect.value || 0);

  let total = 0;

  let itens = carrinho.map(item => {
    let subtotal = item.preco * item.qtd;
    total += subtotal;

    return {
      produtoId: item.produtoId,
      nome: item.nome,
      opcao: item.opcao,
      preco: item.preco,
      qtd: item.qtd
    };
  });

  total += taxa;

  await addDoc(collection(db, "Pedidos"), {
    itens,
    pagamento,
    entrega: entregaTexto,
    taxaEntrega: taxa,
    total,
    status: "novo",
    criadoEm: serverTimestamp()
  });
}

function atualizarSelect(selectId, stockId) {
  let select = document.getElementById(selectId);
  if (!select) return;

  let id = stockId.replace("stock", "");
  let produto = produtos[id - 1];
  if (!produto) return;

  let estoque = produto.estoque || {};

  for (let i = 0; i < select.options.length; i++) {
    let op = select.options[i].text.replace(" (Esgotado)", "");

    if (op === "Opções") continue;

    if ((estoque[op] || 0) <= 0) {
      select.options[i].disabled = true;
      select.options[i].text = op + " (Esgotado)";
    } else {
      select.options[i].disabled = false;
      select.options[i].text = op;
    }
  }
}

async function limparReservas() {
  let agora = Date.now();
  let mudou = false;

  for (let i = carrinho.length - 1; i >= 0; i--) {
    let item = carrinho[i];

    if (agora - item.tempo > 300000) {
      await devolverEstoqueProduto(item.produtoId, item.opcao, item.qtd);
      carrinho.splice(i, 1);
      mudou = true;
    }
  }

  if (mudou) {
    atualizarCarrinho();
  }
}

window.criarProduto = async function () {
  let nome = document.getElementById("novo_nome").value;
  let marca = document.getElementById("novo_marca").value;
  let preco = parseFloat(document.getElementById("novo_preco").value);
  let pasta = document.getElementById("novo_pasta").value;
  let opcoes = document.getElementById("novo_opcoes").value
    .split(",")
    .map(o => o.trim())
    .filter(o => o);
  let imagem = document.getElementById("novo_imagem").value;

  if (!nome || !marca || isNaN(preco) || !pasta || !imagem || opcoes.length === 0) {
    alert("Preencha tudo");
    return;
  }

  let novo = {
    nome,
    marca,
    preco,
    pasta,
    imagem,
    opcoes
  };

  try {
    await addDoc(collection(db, "Produtos"), novo);
    alert("Produto criado no Firebase!");
    await carregarProdutosFirebase();
    window.fecharAdmin();
  } catch (erro) {
    console.error("Erro ao criar produto:", erro);
    alert("Erro ao criar produto no Firebase.");
  }
};

window.salvarEdicaoProdutos = async function () {
  try {
    for (let index = 0; index < produtos.length; index++) {
      let p = produtos[index];

      let nome = document.getElementById(`p_nome_${index}`).value;
      let marca = document.getElementById(`p_marca_${index}`).value;
      let preco = parseFloat(document.getElementById(`p_preco_${index}`).value);
      let pasta = document.getElementById(`p_pasta_${index}`).value;
      let imagem = document.getElementById(`p_imagem_${index}`).value || "1.jpg";
      let opcoes = document.getElementById(`p_opcoes_${index}`).value
        .split(",")
        .map(o => o.trim())
        .filter(o => o);

      await updateDoc(doc(db, "Produtos", p.id), {
        nome,
        marca,
        preco,
        pasta,
        imagem,
        opcoes
      });
    }

    alert("Produtos atualizados no Firebase!");
    await carregarProdutosFirebase();
    window.fecharAdmin();
  } catch (erro) {
    console.error("Erro ao salvar edição:", erro);
    alert("Erro ao atualizar produtos no Firebase.");
  }
};

window.removerProduto = async function (index) {
  let confirmar = confirm("Tem certeza que deseja excluir este produto?");
  if (!confirmar) return;

  try {
    let produtoId = produtos[index].id;
    await deleteDoc(doc(db, "Produtos", produtoId));
    alert("Produto removido do Firebase!");
    await carregarProdutosFirebase();
    window.fecharAdmin();
  } catch (erro) {
    console.error("Erro ao remover produto:", erro);
    alert("Erro ao remover produto do Firebase.");
  }
};

window.fecharAdmin = function () {
  if (window.painelAdmin) {
    window.painelAdmin.remove();
    window.painelAdmin = null;
  }
};

window.salvarAdmin = function () {
  alert("O estoque ainda não está online nesta etapa.");
};

window.onload = function () {
  carregarDados();
  carregarProdutosFirebase();
};
